name: Actualizar Solvento

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "59 23 * * *"  # todos los días a las 23:59 UTC

permissions:
  contents: write

jobs:
  build-finanzas:
    runs-on: ubuntu-latest

    steps:
      - name: Notificar fallo por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: "⚠️ Solvento — fallo en el workflow (${{github.run_id}})"
          to: acasadovadillo@gmail.com
          from: Finanzas Personales Bot
          body: |
            El workflow "Actualizar Solvento" ha fallado.

            Repositorio: ${{github.repository}}
            Run ID: ${{github.run_id}}
            Fecha: ${{github.event.head_commit.timestamp}}

            Ver detalles: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Preparar directorio de datos
        run: |
          mkdir -p data
          echo '{"prices":{},"fx":{}}' > data/prices_cache.json

      - name: Descargar y validar movimientos.csv
        run: |
          curl -fsSL \
            "https://docs.google.com/spreadsheets/d/1zSECHbOkkKyfbkNNhO9FvzpnRP0c46LgYwNFvQfLim4/export?format=csv&gid=1656633092" \
            -o data/movimientos.csv
          BYTES=$(wc -c < data/movimientos.csv)
          FILAS=$(wc -l < data/movimientos.csv)
          echo "movimientos.csv — $FILAS filas, $BYTES bytes"
          if head -1 data/movimientos.csv | grep -qi "<!doctype\|<html"; then
            echo "❌ Google Sheets devolvió HTML (error de acceso o sesión caducada)"
            exit 1
          fi
          if [ "$BYTES" -lt 1000 ]; then
            echo "❌ Archivo demasiado pequeño ($BYTES bytes) — descarga incompleta o vacía"
            exit 1
          fi
          if [ "$FILAS" -lt 50 ]; then
            echo "❌ Solo $FILAS filas — se esperaban ≥50 (posible truncado)"
            exit 1
          fi
          echo "✅ movimientos.csv válido ($FILAS filas, $BYTES bytes)"

      - name: Descargar y validar inversiones.csv
        run: |
          curl -fsSL \
            "https://docs.google.com/spreadsheets/d/1zSECHbOkkKyfbkNNhO9FvzpnRP0c46LgYwNFvQfLim4/export?format=csv&gid=0" \
            -o data/inversiones.csv
          BYTES=$(wc -c < data/inversiones.csv)
          FILAS=$(wc -l < data/inversiones.csv)
          echo "inversiones.csv — $FILAS filas, $BYTES bytes"
          if head -1 data/inversiones.csv | grep -qi "<!doctype\|<html"; then
            echo "❌ Google Sheets devolvió HTML (error de acceso o sesión caducada)"
            exit 1
          fi
          if [ "$BYTES" -lt 200 ]; then
            echo "❌ Archivo demasiado pequeño ($BYTES bytes) — descarga incompleta o vacía"
            exit 1
          fi
          if [ "$FILAS" -lt 10 ]; then
            echo "❌ Solo $FILAS filas — se esperaban ≥10 (posible truncado)"
            exit 1
          fi
          echo "✅ inversiones.csv válido ($FILAS filas, $BYTES bytes)"

      - name: Descargar y validar inmuebles.csv
        run: |
          curl -fsSL \
            "https://docs.google.com/spreadsheets/d/1zSECHbOkkKyfbkNNhO9FvzpnRP0c46LgYwNFvQfLim4/export?format=csv&gid=1264506332" \
            -o data/inmuebles.csv
          BYTES=$(wc -c < data/inmuebles.csv)
          FILAS=$(wc -l < data/inmuebles.csv)
          echo "inmuebles.csv — $FILAS filas, $BYTES bytes"
          if head -1 data/inmuebles.csv | grep -qi "<!doctype\|<html"; then
            echo "❌ Google Sheets devolvió HTML (error de acceso o sesión caducada)"
            exit 1
          fi
          if [ "$BYTES" -lt 50 ]; then
            echo "❌ Archivo demasiado pequeño ($BYTES bytes) — descarga incompleta o vacía"
            exit 1
          fi
          if [ "$FILAS" -lt 2 ]; then
            echo "❌ Solo $FILAS filas — se esperaban ≥2 (cabecera + al menos un inmueble)"
            exit 1
          fi
          echo "✅ inmuebles.csv válido ($FILAS filas, $BYTES bytes)"

      - name: Descargar y validar historico_valor_liquidativo.csv
        run: |
          curl -fsSL \
            "https://docs.google.com/spreadsheets/d/1zSECHbOkkKyfbkNNhO9FvzpnRP0c46LgYwNFvQfLim4/export?format=csv&gid=2139797029" \
            -o data/bankinter_nav.csv
          BYTES=$(wc -c < data/bankinter_nav.csv)
          FILAS=$(wc -l < data/bankinter_nav.csv)
          echo "historico_valor_liquidativo.csv — $FILAS filas, $BYTES bytes"
          if head -1 data/bankinter_nav.csv | grep -qi "<!doctype\|<html"; then
            echo "❌ Google Sheets devolvió HTML (error de acceso o sesión caducada)"
            exit 1
          fi
          if [ "$BYTES" -lt 5000 ]; then
            echo "❌ Archivo demasiado pequeño ($BYTES bytes) — descarga incompleta o vacía"
            exit 1
          fi
          if [ "$FILAS" -lt 100 ]; then
            echo "❌ Solo $FILAS filas — se esperaban ≥100 (posible truncado)"
            exit 1
          fi
          echo "✅ historico_valor_liquidativo.csv válido ($FILAS filas, $BYTES bytes)"

      - name: Archivar repositorio completo del día en historic/
        run: |
          DATE=$(date +%Y-%m-%d)
          if [ -f index.html ]; then
            mkdir -p historic/$DATE
            # Copia todo el repo excepto historic/ y .git/ para que las rutas relativas funcionen igual
            rsync -a --exclude='historic' --exclude='.git' --exclude='data' . historic/$DATE/
            echo "✅ Archivado en historic/$DATE/ ($(du -sh historic/$DATE | cut -f1))"
          else
            echo "ℹ️  No existe index.html previo, se omite el archivado"
          fi

      - name: Instalar dependencias Python
        run: pip install "pandas>=2.2,<3"

      - name: Ejecutar generate.py
        run: python generate.py

      - name: Commit y push de cambios si los hay
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html historic/

          if git diff --cached --quiet; then
            echo "No hay cambios"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "Actualizar finanzas $DATE"
            git push
          fi
