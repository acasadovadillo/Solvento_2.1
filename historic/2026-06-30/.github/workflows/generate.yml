name: Actualizar finanzas

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "59 23 * * *"  # todos los días a las 23:59 UTC

permissions:
  contents: write

jobs:
  build-finanzas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Descargar movimientos.csv desde Google Sheets
        run: |
          curl -L \
            "https://docs.google.com/spreadsheets/d/1zSECHbOkkKyfbkNNhO9FvzpnRP0c46LgYwNFvQfLim4/export?format=csv&gid=1656633092" \
            -o data/movimientos.csv
          echo "✅ movimientos.csv descargado ($(wc -l < data/movimientos.csv) filas)"

      - name: Descargar inversiones.csv desde Google Sheets
        run: |
          curl -L \
            "https://docs.google.com/spreadsheets/d/1zSECHbOkkKyfbkNNhO9FvzpnRP0c46LgYwNFvQfLim4/export?format=csv&gid=0" \
            -o data/inversiones.csv
          echo "✅ inversiones.csv descargado ($(wc -l < data/inversiones.csv) filas)"

      - name: Descargar fondos_manuales.csv desde Google Sheets
        run: |
          curl -L \
            "https://docs.google.com/spreadsheets/d/1zSECHbOkkKyfbkNNhO9FvzpnRP0c46LgYwNFvQfLim4/export?format=csv&gid=1115001182" \
            -o data/fondos_manuales.csv
          echo "✅ fondos_manuales.csv descargado ($(wc -l < data/fondos_manuales.csv) filas)"

      - name: Archivar repositorio completo del día en historic/
        run: |
          DATE=$(date +%Y-%m-%d)
          if [ -f index.html ]; then
            mkdir -p historic/$DATE
            # Copia todo el repo excepto historic/ y .git/ para que las rutas relativas funcionen igual
            rsync -a --exclude='historic' --exclude='.git' . historic/$DATE/
            echo "✅ Archivado en historic/$DATE/ ($(du -sh historic/$DATE | cut -f1))"
          else
            echo "ℹ️  No existe index.html previo, se omite el archivado"
          fi

      - name: Instalar dependencias Python
        run: pip install pandas

      - name: Ejecutar generate.py
        run: python generate.py

      - name: Commit y push de cambios si los hay
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/movimientos.csv data/inversiones.csv data/fondos_manuales.csv index.html historic/

          if git diff --cached --quiet; then
            echo "No hay cambios"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "Actualizar finanzas $DATE"
            git push
          fi
